<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생수 브랜드 AI 판별기 - 파일 업로드</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js 및 Teachable Machine 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <!-- Google AdSense -->
    <!-- Google AdSense Verification -->
    <meta name="google-adsense-account" content="ca-pub-9684896572010314">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9684896572010314"
     crossorigin="anonymous"></script>
</head>
<body>

<header>
    <div class="theme-toggle">
        <button id="themeToggleBtn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <h1>물 브랜드 판별 AI</h1>
    <p>이미지 파일을 업로드하여 브랜드를 분석해보세요</p>
</header>

<div class="container">
    <div class="product">
        <h2>브랜드 분석 (이미지 업로드)</h2>
        <p>삼다수 또는 몽베스트 생수 사진을 업로드해주세요</p>
        
        <!-- 이미지 업로드 및 미리보기 영역 -->
        <div class="upload-section" style="margin: 20px 0;">
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            <button type="button" onclick="document.getElementById('imageInput').click()">사진 선택하기</button>
        </div>
        
        <div id="image-preview-container">
            <img id="imagePreview" src="#" alt="이미지 미리보기" style="display: none; max-width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: var(--shadow);">
        </div>

        <div id="label-container" style="margin-top: 15px;"></div>
    </div>

    <!-- 구매 섹션 -->
    <div class="product" style="margin-top: 40px;">
        <h2>생수 2L 상품</h2>
        <div class="price">3,000원</div>
        <button onclick="buyWater()">구매하기</button>

        <div class="store-list" id="storeList">
            <h3>판매 사이트</h3>
            <div class="store"><a href="https://www.coupang.com" target="_blank">쿠팡</a></div>
            <div class="store"><a href="https://www.11st.co.kr" target="_blank">11번가</a></div>
            <div class="store"><a href="https://www.gmarket.co.kr" target="_blank">G마켓</a></div>
        </div>
    </div>

    <!-- 제휴 문의 -->
    <div class="contact-form">
        <h3>제휴 및 파트너 문의</h3>
        <form action="https://formspree.io/f/xqeyeboq" method="POST">
            <div class="form-group">
                <label for="name">이름/기업명</label>
                <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" required placeholder="문의 내용을 상세히 적어주세요"></textarea>
            </div>
            <button type="submit">문의 제출하기</button>
        </form>
    </div>

    <!-- 댓글 섹션 -->
    <div id="disqus_thread" style="margin-top: 50px; background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: var(--shadow);"></div>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://prowater.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
</div>

<footer>
    <p>© 2026 Water Store AI Platform</p>
</footer>

<script src="main.js"></script>
</body>
</html>
