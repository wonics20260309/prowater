<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생수 브랜드 판별기 - 삼다수 vs 몽베스트</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

<header>
    <div class="theme-toggle">
        <button id="themeToggleBtn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <h1>물 브랜드 판별기</h1>
    <p>삼다수와 몽베스트 브랜드를 AI가 구분합니다</p>
</header>

<div class="container">
    <!-- Classifier Section -->
    <div class="product">
        <h2>브랜드 판별 AI</h2>
        <p>카메라에 생수를 비춰주세요</p>
        
        <div id="webcam-container"></div>
        <div id="label-container"></div>
        
        <div style="margin-top: 20px;">
            <button type="button" id="startBtn" onclick="init()">AI 시작하기</button>
        </div>
    </div>

    <!-- Purchase Section (Existing) -->
    <div class="product" style="margin-top: 40px;">
        <h2>생수 2L 구매하기</h2>
        <p>판별된 물을 바로 구매해보세요</p>
        <div class="price">3,000원</div>
        <button onclick="buyWater()">구매하기</button>

        <div class="store-list" id="storeList">
            <h3>구매 가능한 사이트</h3>
            <div class="store">
                <a href="https://www.coupang.com" target="_blank">쿠팡에서 구매하기</a>
            </div>
            <div class="store">
                <a href="https://www.11st.co.kr" target="_blank">11번가에서 구매하기</a>
            </div>
            <div class="store">
                <a href="https://www.gmarket.co.kr" target="_blank">G마켓에서 구매하기</a>
            </div>
        </div>
    </div>

    <!-- Contact Form (Existing) -->
    <div class="contact-form">
        <h3>제휴 문의</h3>
        <p>함께 성장할 파트너를 찾고 있습니다.</p>
        <form action="https://formspree.io/f/xqeyeboq" method="POST">
            <div class="form-group">
                <label for="name">이름/기업명</label>
                <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)워터">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" required placeholder="제휴 제안 내용을 입력해주세요."></textarea>
            </div>
            <button type="submit">문의 보내기</button>
        </form>
    </div>

    <!-- Comments Section (Existing) -->
    <div id="disqus_thread" style="margin-top: 50px; background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: var(--shadow);"></div>
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://prowater.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
</div>

<footer>
    <p>© 2026 Water Store</p>
</footer>

<script src="main.js"></script>
</body>
</html>
