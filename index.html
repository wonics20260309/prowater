<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생수 구매 - 다크모드 지원</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="theme-toggle">
        <button id="themeToggleBtn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <h1>생수 스토어</h1>
    <p>깨끗한 물을 집까지 배송합니다</p>
</header>

<div class="container">
    <div class="product">
        <h2>생수 2L</h2>
        <p>신선하고 깨끗한 생수</p>
        <div class="price">3,000원</div>
        <button onclick="buyWater()">구매하기</button>

        <div class="store-list" id="storeList">
            <h3>구매 가능한 사이트</h3>
            <div class="store">
                <a href="https://www.coupang.com" target="_blank">쿠팡에서 구매하기</a>
            </div>
            <div class="store">
                <a href="https://www.11st.co.kr" target="_blank">11번가에서 구매하기</a>
            </div>
            <div class="store">
                <a href="https://www.gmarket.co.kr" target="_blank">G마켓에서 구매하기</a>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Water Store</p>
</footer>

<script src="main.js"></script>
</body>
</html>
