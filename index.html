<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생수 구매 - 다크모드 지원</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="theme-toggle">
        <button id="themeToggleBtn" onclick="toggleTheme()">🌙 다크 모드</button>
    </div>
    <h1>생수 스토어</h1>
    <p>깨끗한 물을 집까지 배송합니다</p>
</header>

<div class="container">
    <div class="product">
        <h2>생수 2L</h2>
        <p>신선하고 깨끗한 생수</p>
        <div class="price">3,000원</div>
        <button onclick="buyWater()">구매하기</button>

        <div class="store-list" id="storeList">
            <h3>구매 가능한 사이트</h3>
            <div class="store">
                <a href="https://www.coupang.com" target="_blank">쿠팡에서 구매하기</a>
            </div>
            <div class="store">
                <a href="https://www.11st.co.kr" target="_blank">11번가에서 구매하기</a>
            </div>
            <div class="store">
                <a href="https://www.gmarket.co.kr" target="_blank">G마켓에서 구매하기</a>
            </div>
        </div>
    </div>

    <div class="contact-form">
        <h3>제휴 문의</h3>
        <p>함께 성장할 파트너를 찾고 있습니다.</p>
        <form action="https://formspree.io/f/xqeyeboq" method="POST">
            <div class="form-group">
                <label for="name">이름/기업명</label>
                <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)워터">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" required placeholder="제휴 제안 내용을 입력해주세요."></textarea>
            </div>
            <button type="submit">문의 보내기</button>
        </form>
    </div>
    </div>

    <div id="disqus_thread" style="margin-top: 50px; background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: var(--shadow);"></div>
    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.

        };

        var d = document, s = d.createElement('script');

        })();

<footer>
    <p>© 2026 Water Store</p>
</footer>

<script src="main.js"></script>
</body>
</html>
