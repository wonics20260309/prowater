11<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Utility Tools | 스마트 물 관리 플랫폼</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        .container {
            max-width: 768px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-secondary);
        }

        section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Reminder Section */
        .reminder-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .interval-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn-check {
            display: none;
        }

        .btn-label {
            display: block;
            padding: 12px;
            text-align: center;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-check:checked + .btn-label {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
            border-color: var(--accent-color);
        }

        .main-btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-start { background: var(--accent-color); color: var(--bg-color); }
        .btn-stop { background: var(--danger-color); color: white; }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Stats Section */
        .stats-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: bold;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .add-intake {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .input-ml {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: white;
        }

        /* Quiz Section */
        .quiz-container {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question-box h3 { margin-bottom: 20px; }
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 15px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }
        .option-btn:hover { background: #2d3e5a; }

        .result-box { text-align: center; }
        .result-title { font-size: 1.5rem; color: var(--accent-color); margin: 15px 0; }
        .result-desc { color: var(--text-secondary); margin-bottom: 20px; }
        .brand-recommend { font-weight: bold; margin-bottom: 20px; }

        .share-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .share-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-kakao { background: #fee500; color: #3c1e1e; }
        .btn-link { background: #4b5563; color: white; }

        @media (max-width: 480px) {
            header h1 { font-size: 1.5rem; }
            .interval-selector { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>💧 Water Utility Tools</h1>
        <p>스마트한 수분 관리를 위한 필수 도구 모음</p>
    </header>

    <!-- Section 1: Reminder -->
    <section id="reminder">
        <h2>⏰ 수분 섭취 리마인더</h2>
        <div class="reminder-controls">
            <div class="interval-selector">
                <input type="radio" name="interval" id="int30" value="30" class="btn-check" checked>
                <label for="int30" class="btn-label">30분</label>
                
                <input type="radio" name="interval" id="int60" value="60" class="btn-check">
                <label for="int60" class="btn-label">1시간</label>
                
                <input type="radio" name="interval" id="int120" value="120" class="btn-check">
                <label for="int120" class="btn-label">2시간</label>
            </div>
            <button id="startReminder" class="main-btn btn-start">알림 시작하기</button>
            <button id="stopReminder" class="main-btn btn-stop" style="display: none;">알림 중지</button>
        </div>
    </section>

    <!-- Section 2: Statistics -->
    <section id="statistics">
        <h2>📊 수분 섭취 통계</h2>
        <div class="stats-tabs">
            <button class="tab-btn active" onclick="switchTab('weekly')">주간</button>
            <button class="tab-btn" onclick="switchTab('monthly')">월간</button>
        </div>
        <div class="chart-container">
            <canvas id="waterChart"></canvas>
        </div>
        <div class="add-intake">
            <input type="number" id="intakeAmount" class="input-ml" placeholder="섭취량(ml) 입력">
            <button onclick="addIntake()" class="tab-btn active" style="flex: 0 0 80px;">추가</button>
        </div>
    </section>

    <!-- Section 3: Compatibility Test -->
    <section id="quiz">
        <h2>🧬 내 물 궁합 테스트</h2>
        <div id="quizContent" class="quiz-container">
            <!-- Questions or Results will be injected here -->
        </div>
    </section>
</div>

<script>
    /* 1. Reminder Logic */
    let reminderTimer = null;
    const startBtn = document.getElementById('startReminder');
    const stopBtn = document.getElementById('stopReminder');

    startBtn.addEventListener('click', async () => {
        if (!("Notification" in window)) {
            alert("이 브라우저는 알림 기능을 지원하지 않습니다.");
            return;
        }

        const permission = await Notification.requestPermission();
        if (permission === "granted") {
            const interval = document.querySelector('input[name="interval"]:checked').value;
            const ms = interval * 60 * 1000;
            
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            
            alert(`${interval}분마다 알림을 보내드릴게요! 💧`);
            
            reminderTimer = setInterval(() => {
                new Notification("물 마실 시간이에요! 💧", {
                    body: "수분을 보충하고 건강을 챙기세요.",
                    icon: "https://cdn-icons-png.flaticon.com/512/3105/3105807.png"
                });
            }, ms);
        } else {
            alert("알림 권한을 허용해야 기능을 사용할 수 있습니다.");
        }
    });

    stopBtn.addEventListener('click', () => {
        clearInterval(reminderTimer);
        startBtn.style.display = 'block';
        stopBtn.style.display = 'none';
        alert("알림이 중지되었습니다.");
    });

    /* 2. Statistics Logic */
    let currentTab = 'weekly';
    let chart = null;
    const DAILY_GOAL = 2000;

    function getIntakeData() {
        const data = localStorage.getItem('waterIntake');
        return data ? JSON.parse(data) : {};
    }

    function saveIntakeData(data) {
        localStorage.setItem('waterIntake', JSON.stringify(data));
    }

    function addIntake() {
        const amount = parseInt(document.getElementById('intakeAmount').value);
        if (!amount) return;
        
        const today = new Date().toISOString().split('T')[0];
        const data = getIntakeData();
        data[today] = (data[today] || 0) + amount;
        
        saveIntakeData(data);
        document.getElementById('intakeAmount').value = '';
        renderChart();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === (tab === 'weekly' ? '주간' : '월간'));
        });
        renderChart();
    }

    function renderChart() {
        const ctx = document.getElementById('waterChart').getContext('2d');
        const data = getIntakeData();
        const labels = [];
        const values = [];
        const colors = [];

        if (currentTab === 'weekly') {
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                labels.push(d.getMonth() + 1 + '/' + d.getDate());
                const val = data[dateStr] || 0;
                values.push(val);
                colors.push(val >= DAILY_GOAL ? '#38bdf8' : '#4b5563');
            }
        } else {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                labels.push(i + '일');
                values.push(data[dateStr] || 0);
            }
        }

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: currentTab === 'weekly' ? 'bar' : 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '섭취량 (ml)',
                    data: values,
                    backgroundColor: currentTab === 'weekly' ? colors : 'rgba(56, 189, 248, 0.2)',
                    borderColor: '#38bdf8',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        });
    }

    /* 3. Quiz Logic */
    const questions = [
        { q: "평소 운동량은?", a: ["거의 안 함", "주 2~3회", "매일"] },
        { q: "건강 관심사는?", a: ["다이어트", "피부미용", "운동퍼포먼스", "일반건강"] },
        { q: "물맛 선호도는?", a: ["부드러운 맛", "깔끔한 맛", "미네랄 느낌"] },
        { q: "하루 물 섭취 습관은?", a: ["자주 조금씩", "한 번에 많이", "불규칙"] },
        { q: "주로 마시는 상황은?", a: ["운동 중", "식사 중", "업무 중", "일상"] }
    ];

    const results = [
        { title: "🏔️ 고산수 타입!", desc: "깨끗하고 부드러운 목넘김을 선호하는 당신! 불순물이 적고 청량한 물이 잘 맞아요.", brands: "삼다수, 백산수" },
        { title: "💎 미네랄 워터 타입!", desc: "풍부한 영양과 묵직한 맛을 즐기는 당신! 칼슘과 마그네슘이 풍부한 물을 추천해요.", brands: "에비앙, 피지워터" },
        { title: "🌊 해양심층수 타입!", desc: "피부 미용과 건강에 관심이 많은 당신! 깊은 바다의 청정 에너지를 담은 물이 제격!", brands: "해양심층수 천년동안" },
        { title: "⚡ 알칼리 이온수 타입!", desc: "운동량이 많고 빠른 수분 보충이 필요한 당신! 몸의 밸런스를 잡아주는 기능성 물이 좋아요.", brands: "아이시스 8.0" },
        { title: "🥤 탄산수 타입!", desc: "일상의 지루함을 깨고 싶은 활동적인 당신! 톡 쏘는 탄산수가 활력을 불어넣어 줄 거예요.", brands: "트레비, 씨그램" }
    ];

    let currentQ = 0;
    let answers = [];

    function startQuiz() {
        currentQ = 0;
        answers = [];
        showQuestion();
    }

    function showQuestion() {
        const container = document.getElementById('quizContent');
        if (currentQ >= questions.length) {
            showResult();
            return;
        }

        const q = questions[currentQ];
        container.innerHTML = `
            <div class="question-box">
                <p style="color:var(--accent-color); margin-bottom:5px;">Q${currentQ+1}/5</p>
                <h3>${q.q}</h3>
                <div class="options-list">
                    ${q.a.map((opt, i) => `<button class="option-btn" onclick="nextQuestion(${i})">${opt}</button>`).join('')}
                </div>
            </div>
        `;
    }

    function nextQuestion(idx) {
        answers.push(idx);
        currentQ++;
        showQuestion();
    }

    function showResult() {
        const container = document.getElementById('quizContent');
        // Simple logic based on last answer or sum
        const resultIdx = (answers.reduce((a,b) => a+b, 0)) % results.length;
        const res = results[resultIdx];

        container.innerHTML = `
            <div class="result-box">
                <p>당신의 물 궁합 결과는?</p>
                <div class="result-title">${res.title}</div>
                <p class="result-desc">${res.desc}</p>
                <div class="brand-recommend">추천 브랜드: ${res.brands}</div>
                <div class="share-btns">
                    <button class="share-btn btn-kakao" onclick="alert('카카오톡 공유 기능은 API 키가 필요합니다.')">카카오톡 공유</button>
                    <button class="share-btn btn-link" onclick="copyLink()">링크 복사</button>
                </div>
                <button onclick="startQuiz()" class="tab-btn" style="margin-top:20px; width:120px;">다시 하기</button>
            </div>
        `;
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        alert('링크가 복사되었습니다!');
    }

    // Initialize
    window.onload = () => {
        renderChart();
        startQuiz();
    };
</script>

</body>
</html>
